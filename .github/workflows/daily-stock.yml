name: 每日股票自动分析
# 触发规则：每天9:30（北京时间）自动运行 + 支持手动测试
on:
  schedule:
    # UTC时间1:30 = 北京时间9:30，周一到周五A股交易日运行
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取你仓库的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装Python 3.10环境（项目兼容版本）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 升级pip并安装项目依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 运行股票分析主脚本
      - name: Run stock analysis
        env:
          # 把Secrets里的配置传给脚本
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PWD: ${{ secrets.EMAIL_PWD }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python main.py

      # 5. 保存分析报告（方便你在GitHub上查看）
      - name: Save report
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-report
          path: ./
